volumes:
  flood:
    driver_opts:
      type: "nfs"
      o: "addr=${NFS_HOST},nolock,soft,rw"
      device: ":${DOCKER_VOLUME_PATH}/flood"
  letsencrypt:
    driver_opts:
      type: "nfs"
      o: "addr=${NFS_HOST},nolock,soft,rw"
      device: ":${DOCKER_VOLUME_PATH}/letsencrypt"
  media:
    driver_opts:
      type: "nfs"
      o: "addr=${NFS_HOST},nolock,soft,rw"
      device: ":${DOCKER_VOLUME_PATH}"
  