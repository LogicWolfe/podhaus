services:
  plex:
    container_name: plex
    hostname: Bilby
    image: plexinc/pms-docker:latest
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: Australia/Perth
      PLEX_UID: "1000"
      PLEX_GID: "100"
      CHANGE_CONFIG_DIR_OWNERSHIP: "false"
    volumes:
      # All Plex state on local NVMe (DB, config, metadata)
      - /var/lib/plex-local:/config:z
      # BIFs (video scrubbing thumbnails) live on Pouch — ~183 GB
      - /mnt/pouch/plex-video-thumbnails:/config/Library/Application Support/Plex Media Server/Media/localhost
      # Media files
      - /mnt/pouch:/Users/Shared/Pouch
      - ./healthcheck.sh:/scripts/healthcheck.sh:ro,z
    tmpfs:
      - /transcode:size=4g
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD", "/scripts/healthcheck.sh"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 180s
