services:
  plex:
    container_name: plex
    hostname: Bilby
    image: plexinc/pms-docker:latest
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: Australia/Perth
      PLEX_UID: "1000"
      PLEX_GID: "100"
      CHANGE_CONFIG_DIR_OWNERSHIP: "false"
    volumes:
      # All Plex state on local NVMe (DB, config, metadata)
      - /var/lib/plex-local:/config:z
      # Transcode scratch on local NVMe. Was a 4G tmpfs originally — RAM
      # made sense back when "all bilby state on NFS" meant disk-backed
      # transcode would have been disastrous. Post-phase-6 pivot the M1's
      # internal NVMe handles this trivially (transcoding is ~1 MB/s vs
      # 1+ GB/s available), and freeing 4 GB of RAM headroom is more
      # valuable than the theoretical RAM-vs-NVMe speed delta. Owned
      # 1000(nathan):100(users) on the host to match the Plex process's
      # uid/gid (PLEX_UID=1000 PLEX_GID=100 above).
      - /var/lib/plex-transcode:/transcode:z
      # BIFs (video scrubbing thumbnails) live on Pouch — ~183 GB
      - /mnt/pouch/plex-video-thumbnails:/config/Library/Application Support/Plex Media Server/Media/localhost
      # Media files
      - /mnt/pouch:/Users/Shared/Pouch
      - ./healthcheck.sh:/scripts/healthcheck.sh:ro,z
      - ./stats-cleanup.sh:/scripts/stats-cleanup.sh:ro,z
    labels:
      autoheal: "true"
      # Monthly statistics_bandwidth prune + VACUUM via ofelia (label-based
      # docker job scheduler — see ofelia/compose.yaml). Runs on the 1st
      # of each month at 4 AM AWST (cron is interpreted in the ofelia
      # container's local time, set via TZ). 4 AM puts it after the
      # nightly Backrest pipeline completes (~03:30 including rclone
      # sync), so today's backup preserves the pre-cleanup state. Plex
      # never prunes this table itself; without the cleanup it grows
      # unbounded (caused the April 2026 outage when it hit 47 GB / 796M
      # rows). Monthly cadence is plenty — the table grows at ~30 rows/
      # day so even a missed month means ~900 extra rows of headroom,
      # not gigabytes.
      ofelia.enabled: "true"
      ofelia.job-exec.plex-stats-cleanup.schedule: "0 4 1 * *"
      ofelia.job-exec.plex-stats-cleanup.command: "/scripts/stats-cleanup.sh"
    healthcheck:
      test: ["CMD", "/scripts/healthcheck.sh"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 180s
