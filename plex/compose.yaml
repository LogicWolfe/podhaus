services:
  plex:
    container_name: plex
    hostname: Bilby
    image: plexinc/pms-docker:latest
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: Australia/Perth
      PLEX_UID: "1000"
      PLEX_GID: "100"
      CHANGE_CONFIG_DIR_OWNERSHIP: "false"
    volumes:
      - jump:/config
      - /mnt/pouch:/Users/Shared/Pouch
      - ./healthcheck.sh:/scripts/healthcheck.sh:ro,z
    tmpfs:
      - /transcode:size=4g
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD", "/scripts/healthcheck.sh"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 180s

volumes:
  jump:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=10.0.0.25,nfsvers=4.1,soft,timeo=600,retrans=5,rw"
      device: ":/Jump/plex"
