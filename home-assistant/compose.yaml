services:
  home-assistant:
    container_name: home-assistant
    image: homeassistant/home-assistant:stable
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      TZ: ${TZ}
    volumes:
      # HA config + recorder SQLite DB (~85 MB). Local NVMe per the
      # post-phase-6 sizing rule. Host bind mount so the container
      # matches exactly what's on the host; :z lets SELinux relabel
      # the content for container access.
      - /var/lib/home-assistant:/config:z
      - /run/dbus:/run/dbus:ro
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8123/ > /dev/null && ls /config > /dev/null"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
