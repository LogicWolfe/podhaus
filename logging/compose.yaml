services:
  victoria-logs:
    container_name: victoria-logs
    image: victoriametrics/victoria-logs:latest
    restart: unless-stopped
    # Run as 1000:100 to match the NAS Jump squash effective uid:gid.
    # Without this, Victoria Logs runs as its default in-image user
    # (different uid) and writes get squashed to 1000:100, then VL
    # can't read its own files back. Plex follows the same pattern
    # (PLEX_UID=1000 PLEX_GID=100) for the same reason.
    user: "1000:100"
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=180d
      - -retention.maxDiskSpaceUsageBytes=50GB
      - -httpListenAddr=:9428
      - -loggerFormat=json
    ports:
      # Expose to LAN so vmui is reachable directly at http://bilby:9428/select/vmui
      # for head-to-head comparison against Grafana before deciding which UI
      # to keep long-term. Container also reachable internally via dockernet
      # at http://victoria-logs:9428 for Alloy push + Grafana datasource.
      - "9428:9428"
    volumes:
      # Storage on Jump (NAS SSD) per the storage tier rule. Log history
      # is "durable state we'd hate to lose"; size cap prevents Jump fill.
      - /mnt/jump/victoria-logs:/victoria-logs-data
    networks:
      - dockernet
    labels:
      autoheal: "true"
    # No healthcheck: victoriametrics images don't ship wget/curl/sh in
    # their distroless base. VL's HTTP API is the actual liveness signal;
    # if it stops accepting writes Alloy logs the failure and Grafana
    # queries will fail visibly. Same shape as the cloudflare-tunnel and
    # paperless-tika decisions.

  alloy:
    container_name: alloy
    image: grafana/alloy:latest
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    # SELinux enforcing on Fedora Asahi denies both cross-label writes
    # to /var/run/docker.sock and cross-label reads into bind-mounted
    # config files; label:disable covers both.
    security_opt:
      - label:disable
    volumes:
      - ${PODHAUS_REPO}/logging/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      victoria-logs:
        condition: service_started
    networks:
      - dockernet
    labels:
      autoheal: "true"
    # Alloy's base image is minimal Debian with no curl/wget/nc, so we
    # use bash's /dev/tcp shortcut to open a socket to the metrics port
    # as a liveness probe.
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/12345' 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    restart: unless-stopped
    # SELinux enforcing on Fedora Asahi denies cross-label reads into
    # the bind-mounted datasources provisioning file; label:disable
    # lifts the confinement.
    security_opt:
      - label:disable
    # First-boot credentials: admin/admin. Grafana forces a password
    # change on first login through the UI. Rotate once logs.pod.haus
    # is wired up; no 1P item for this yet on purpose (no pinned
    # password means no stale credential drift in the repo).
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://grafana.pod.haus
      # Auto-install datasource plugins on container start. Plugins
      # live in the persistent grafana-data volume so they only
      # download once.
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource,yesoreyeram-infinity-datasource
      # Preinstalled drilldown apps disabled — Logs drilldown requires
      # full Loki query API compatibility that VL doesn't implement
      # (push protocol is Loki-compat but query side isn't). Use
      # Explore → Victoria Logs datasource for log queries in Grafana,
      # or vmui at logs.pod.haus for the native VL experience.
      GF_APPS_GRAFANA_LOKIEXPLORE_APP_ENABLED: "false"
      GF_APPS_GRAFANA_PYROSCOPE_APP_ENABLED: "false"
      GF_APPS_GRAFANA_EXPLORETRACES_APP_ENABLED: "false"
      TZ: ${TZ}
    volumes:
      - grafana-data:/var/lib/grafana
      - ${PODHAUS_REPO}/logging/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/victoria-logs.yaml:ro
      - ${PODHAUS_REPO}/logging/grafana-dashboard-provider.yaml:/etc/grafana/provisioning/dashboards/podhaus.yaml:ro
      - ${PODHAUS_REPO}/logging/grafana-dashboards:/etc/grafana/provisioning/dashboards/podhaus:ro
    depends_on:
      victoria-logs:
        condition: service_started
    networks:
      - dockernet
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health > /dev/null"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  dockernet:
    external: true

volumes:
  # alloy + grafana state stay as local docker volumes (NAS squash
  # carve-out — same as komodo-postgres, see komodo/ferretdb.compose.yaml).
  # victoria-logs storage is a host bind mount to /mnt/jump/victoria-logs
  # (NFS Jump) per the storage tier rule, so no named volume here for it.
  alloy-data:
  grafana-data:
