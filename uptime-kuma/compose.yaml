services:
  uptime-kuma:
    container_name: uptime-kuma
    image: louislam/uptime-kuma:2
    restart: unless-stopped
    # Runs as root inside the container and needs to write to /app/data;
    # SELinux denies the bind mount read/write without label:disable.
    security_opt:
      - label:disable
    environment:
      TZ: ${TZ}
    volumes:
      - uptime-kuma-data:/app/data
      # Allow the container to run TCP/HTTP monitors against other
      # containers on dockernet and against the docker socket for
      # container-status monitors.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 3001:3001
    networks:
      - dockernet
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD-SHELL", "extra/healthcheck"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  dockernet:
    external: true

volumes:
  # Local volume for the same /Jump squash carve-out as komodo-postgres
  # (see komodo/ferretdb.compose.yaml). Flip to NFS at
  # :/Jump/uptime-kuma once the export mode is fixed.
  uptime-kuma-data:
