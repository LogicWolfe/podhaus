services:
  backrest:
    container_name: backrest
    image: garethgeorge/backrest:latest
    restart: unless-stopped
    ports:
      - 9898:9898
    environment:
      BACKREST_PORT: "0.0.0.0:9898"
      BACKREST_CONFIG: /config/config.json
      BACKREST_DATA: /data
      BACKREST_RESTIC_COMMAND: /bin/restic
      XDG_CACHE_HOME: /cache
      TZ: ${TZ}
      # Backrest shell hooks and ad-hoc restic runs can reach these
      # directly without calling back into 1P.
      RESTIC_REPOSITORY: /repos/podhaus
      RESTIC_PASSWORD: ${RESTIC_REPO_PASSWORD}
      # rclone's own RCLONE_CONFIG env var points to the rendered config
      # file bind-mounted in below. See komodo-start — the file is
      # rendered from 1P via op CLI so we don't try to squeeze a
      # multi-line Secure Note through Komodo's env-file pipeline (which
      # truncates at the first newline).
      RCLONE_CONFIG: /rclone/rclone.conf
    volumes:
      # Backrest runtime state (oplog, jwt-secret, kvdb, tasklogs).
      - backrest-data:/data
      # /config is a named volume so Backrest can write anything it
      # wants into that dir, BUT the config.json itself is overridden
      # by a read-only bind mount from /etc/komodo/backup/config.json
      # (rendered on the host by komodo-start from the checked-in
      # config.json.tmpl + 1P secrets). This is the config-as-code path:
      # the repo is the source of truth for backup plans; UI edits to
      # the config fail by design.
      - backrest-config:/config
      - /etc/komodo/backup/config.json:/config/config.json:ro
      - backrest-cache:/cache

      # Restic repository target on Pouch (where snapshots actually land).
      - /mnt/pouch/backups:/repos/podhaus

      # rclone config rendered on the host by komodo-start.
      - /etc/komodo/rclone/rclone.conf:/rclone/rclone.conf:ro

      # Source data to back up — all read-only. Layout:
      #   /userdata/<stack>          — host bind mounts for migrated stacks
      #   /userdata/<stack>/<dir>    — nested for stacks with multiple volumes
      #
      # Host bind mounts (post-phase-6 migrated stacks):
      - /var/lib/plex-local:/userdata/plex:ro
      - /var/lib/flood-db:/userdata/flood:ro
      - /var/lib/home-assistant:/userdata/home-assistant:ro
      - /var/lib/paperless-pgdata:/userdata/paperless/pgdata:ro
      - /var/lib/paperless-data:/userdata/paperless/data:ro
      #
      # Docker named volumes from stacks that still use them (NAS squash
      # carve-out stacks + logging + onepassword + uptime-kuma). Referenced
      # via `external: true` in the volumes block below so docker can share
      # the live data with the owning container read-only.
      - komodo_postgres-data:/userdata/komodo/postgres:ro
      - komodo_ferretdb-state:/userdata/komodo/ferretdb:ro
      - onepassword_op-connect-data:/userdata/onepassword:ro
      - logging_loki-data:/userdata/logging/loki:ro
      - logging_alloy-data:/userdata/logging/alloy:ro
      - logging_grafana-data:/userdata/logging/grafana:ro
      - uptime-kuma_uptime-kuma-data:/userdata/uptime-kuma:ro
      #
      # Backrest backing up its own state. Kept at a separate mount
      # point so the backrest-state plan targets it explicitly.
      - backrest-data:/userdata/backrest-state:ro
    # Backrest shell hooks need docker socket access to exec into other
    # containers for live DB dumps (plex library, paperless pg, komodo pg).
    # label:disable lifts SELinux confinement for that.
    security_opt:
      - label:disable
    networks:
      - dockernet
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9898/ > /dev/null"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  dockernet:
    external: true

volumes:
  # Backrest's own state (runtime, config dir, cache). Small, latency
  # sensitive, stay local per the post-phase-6 sizing rule.
  backrest-data:
  backrest-config:
  backrest-cache:

  # External volumes owned by other stacks — Backrest mounts them read-only
  # as backup sources. `external: true` tells compose to reuse the existing
  # volumes by name rather than creating project-prefixed clones.
  komodo_postgres-data:
    external: true
  komodo_ferretdb-state:
    external: true
  onepassword_op-connect-data:
    external: true
  logging_loki-data:
    external: true
  logging_alloy-data:
    external: true
  logging_grafana-data:
    external: true
  uptime-kuma_uptime-kuma-data:
    external: true
