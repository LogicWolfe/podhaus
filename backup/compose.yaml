services:
  backrest:
    container_name: backrest
    image: garethgeorge/backrest:latest
    restart: unless-stopped
    ports:
      - 9898:9898
    environment:
      BACKREST_PORT: "0.0.0.0:9898"
      BACKREST_CONFIG: /config/config.json
      BACKREST_DATA: /data
      BACKREST_RESTIC_COMMAND: /bin/restic
      XDG_CACHE_HOME: /cache
      TZ: ${TZ}
      # Backrest shell hooks and ad-hoc restic runs can reach these
      # directly without calling back into 1P.
      RESTIC_REPOSITORY: /repos/podhaus
      RESTIC_PASSWORD: ${RESTIC_REPO_PASSWORD}
      # rclone's own RCLONE_CONFIG env var points to the rendered config
      # file bind-mounted in below. See komodo-start — the file is
      # rendered from 1P via op CLI so we don't try to squeeze a
      # multi-line Secure Note through Komodo's env-file pipeline (which
      # truncates at the first newline).
      RCLONE_CONFIG: /rclone/rclone.conf
      # rclone also uses cache files under XDG_CONFIG_HOME by default;
      # point it at /tmp so it doesn't try to create $HOME/.config/rclone
      # under a read-only filesystem layer.
      RCLONE_CONFIG_DIR: /tmp/rclone
    volumes:
      # Backrest runtime state (oplog, jwt-secret, kvdb, tasklogs).
      - backrest-data:/data
      # /config is a host bind mount rendered by komodo-start from the
      # checked-in backup/config.json.tmpl + 1P secrets. The repo is the
      # canonical source of truth. Backrest rewrites this file in place
      # on startup (config normalization / schema migration) and on UI
      # edits, so we can't use a read-only bind — that breaks Backrest's
      # rename-based atomic write. Any drift between the live file and
      # the template is erased on the next `komodo-start` run, which
      # re-renders the template over whatever's there. :z for SELinux
      # relabel so the container can write.
      - /etc/komodo/backup:/config:z
      - backrest-cache:/cache

      # Restic repository target on Jump (NAS SSD). Per the revised storage
      # tier rule, the backup repo lives on Jump — durable storage we'd hate
      # to lose, on a different physical drive set than Pouch's bulk media.
      # SSD reliability vs Pouch's spinning disks is the primary motivation;
      # IOPS aren't the driver since restic backups are sequential.
      - /mnt/jump/backups:/repos/podhaus

      # rclone config rendered on the host by komodo-start. Mounted
      # as a writable directory (not a read-only file) because rclone
      # needs to persist refreshed OAuth tokens back to the config —
      # a read-only single-file bind prevents the rename-based atomic
      # write rclone uses, which traps rclone in a permanently-
      # refreshing-in-memory state. Drift from the 1P source is erased
      # on the next komodo-start run which re-renders the template.
      - /etc/komodo/rclone:/rclone:z

      # Source data to back up — all read-only. Layout:
      #   /userdata/<stack>          — host bind mounts for migrated stacks
      #   /userdata/<stack>/<dir>    — nested for stacks with multiple volumes
      #
      # Host bind mounts (post-phase-6 migrated stacks):
      - /var/lib/plex-local:/userdata/plex:ro
      - /var/lib/flood-db:/userdata/flood:ro
      - /var/lib/home-assistant:/userdata/home-assistant:ro
      - /var/lib/paperless-pgdata:/userdata/paperless/pgdata:ro
      - /var/lib/paperless-data:/userdata/paperless/data:ro
      #
      # Docker named volumes from stacks that still use them (NAS squash
      # carve-out stacks + logging + onepassword + uptime-kuma). Referenced
      # via `external: true` in the volumes block below so docker can share
      # the live data with the owning container read-only.
      - komodo_postgres-data:/userdata/komodo/postgres:ro
      - komodo_ferretdb-state:/userdata/komodo/ferretdb:ro
      - onepassword_op-connect-data:/userdata/onepassword:ro
      - logging_alloy-data:/userdata/logging/alloy:ro
      - logging_grafana-data:/userdata/logging/grafana:ro
      # Victoria Logs storage (replaces the old Loki named volume).
      # Lives on Jump alongside the backup repo itself; backed up so
      # Victoria Logs history survives a Jump RAID failure (off-site
      # via the rclone OneDrive sync hook).
      - /mnt/jump/victoria-logs:/userdata/logging/victoria-logs:ro
      - uptime-kuma_uptime-kuma-data:/userdata/uptime-kuma:ro
      #
      # Backrest backing up its own state. Kept at a separate mount
      # point so the backrest-state plan targets it explicitly.
      - backrest-data:/userdata/backrest-state:ro
    # Backrest shell hooks need docker socket access to exec into other
    # containers for live DB dumps (plex library, paperless pg, komodo pg).
    # label:disable lifts SELinux confinement for that.
    security_opt:
      - label:disable
    networks:
      - dockernet
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9898/ > /dev/null"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  dockernet:
    external: true

volumes:
  # Backrest's own state (runtime data + restic cache). Small, latency
  # sensitive, stay local per the post-phase-6 sizing rule. /config is
  # not a named volume — it's a host bind mount to /etc/komodo/backup
  # (see the service block comment).
  backrest-data:
  backrest-cache:

  # External volumes owned by other stacks — Backrest mounts them read-only
  # as backup sources. `external: true` tells compose to reuse the existing
  # volumes by name rather than creating project-prefixed clones.
  komodo_postgres-data:
    external: true
  komodo_ferretdb-state:
    external: true
  onepassword_op-connect-data:
    external: true
  logging_alloy-data:
    external: true
  logging_grafana-data:
    external: true
  uptime-kuma_uptime-kuma-data:
    external: true
