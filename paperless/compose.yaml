services:
  paperless-postgres:
    container_name: paperless-postgres
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: ${PAPERLESS_POSTGRES_PASSWORD}
    volumes:
      - paperless-pgdata:/var/lib/postgresql/data
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperless && ls /var/lib/postgresql/data > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dockernet

  paperless-redis:
    container_name: paperless-redis
    image: redis:7
    restart: unless-stopped
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - dockernet

  paperless-tika:
    container_name: paperless-tika
    image: apache/tika:latest
    restart: unless-stopped
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9998/tika > /dev/null"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dockernet

  paperless-gotenberg:
    container_name: paperless-gotenberg
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    command: gotenberg --chromium-disable-javascript=true --chromium-allow-list=file:///tmp/.*
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health > /dev/null"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dockernet

  paperless:
    container_name: paperless
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      paperless-postgres:
        condition: service_healthy
      paperless-redis:
        condition: service_healthy
      paperless-tika:
        condition: service_started
      paperless-gotenberg:
        condition: service_started
    environment:
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_DBHOST: paperless-postgres
      PAPERLESS_DBPORT: "5432"
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: ${PAPERLESS_POSTGRES_PASSWORD}
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}
      PAPERLESS_ADMIN_USER: nathan
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD}
      PAPERLESS_URL: https://paperless.pod.haus
      PAPERLESS_CSRF_TRUSTED_ORIGINS: https://paperless.pod.haus
      PAPERLESS_ALLOWED_HOSTS: paperless.pod.haus
      PAPERLESS_OCR_LANGUAGE: eng
      PAPERLESS_TIKA_ENABLED: "true"
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://paperless-gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://paperless-tika:9998
      PAPERLESS_EMAIL_TASK_CRON: "*/10 * * * *"
      PAPERLESS_CONSUMER_ENABLE_BARCODES: "true"
      PAPERLESS_TIME_ZONE: ${TZ}
    volumes:
      - paperless-data:/usr/src/paperless/data
      - /mnt/pouch/Paperless:/usr/src/paperless/media
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ > /dev/null && ls /usr/src/paperless/data > /dev/null && ls /usr/src/paperless/media > /dev/null"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
    networks:
      - dockernet

volumes:
  paperless-pgdata:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=10.0.0.25,nfsvers=4.1,soft,timeo=600,retrans=5,rw"
      device: ":/Jump/paperless/pgdata"
  paperless-data:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=10.0.0.25,nfsvers=4.1,soft,timeo=600,retrans=5,rw"
      device: ":/Jump/paperless/data"

networks:
  dockernet:
    external: true
