###################################
# KOMODO COMPOSE - FERRETDB       #
###################################

## This compose file deploys:
##   1. Postgres + FerretDB Mongo adapter (https://www.ferretdb.com)
##   2. Komodo Core
##   3. Komodo Periphery
##
## All state lives on NFS under /Jump/komodo/ so bilby remains stateless.
## These services are the orchestration layer — they're intentionally not
## labelled for autoheal (restart: unless-stopped handles crashes; autoheal
## loops here would risk interrupting in-flight deployments).

services:
  postgres:
    container_name: komodo-postgres
    image: ghcr.io/ferretdb/postgres-documentdb
    labels:
      komodo.skip:
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${KOMODO_DB_USERNAME}
      POSTGRES_PASSWORD: ${KOMODO_DB_PASSWORD}
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KOMODO_DB_USERNAME}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  ferretdb:
    container_name: komodo-ferretdb
    image: ghcr.io/ferretdb/ferretdb
    labels:
      komodo.skip:
    restart: unless-stopped
    depends_on:
      - postgres
    volumes:
      - ferretdb-state:/state
    environment:
      FERRETDB_POSTGRESQL_URL: postgres://${KOMODO_DB_USERNAME}:${KOMODO_DB_PASSWORD}@postgres:5432/postgres
    # No healthcheck — ferretdb image is distroless, no shell available
    # to probe from inside. Komodo Core's own healthcheck covers the pair
    # (Core depends on ferretdb so Core unhealthy == ferretdb broken).

  core:
    container_name: komodo-core
    image: ghcr.io/moghtech/komodo-core:${COMPOSE_KOMODO_IMAGE_TAG:-latest}
    labels:
      komodo.skip:
    restart: unless-stopped
    # SELinux enforcing on Fedora Asahi denies the container from reading
    # the bind-mounted repo at /syncs/podhaus; label:disable lifts that
    # so ResourceSync can scan the repo contents.
    security_opt:
      - label:disable
    depends_on:
      - ferretdb
    ports:
      - 9120:9120
    networks:
      - default
      - dockernet
    environment:
      KOMODO_DATABASE_ADDRESS: ferretdb:27017
      KOMODO_DATABASE_USERNAME: ${KOMODO_DB_USERNAME}
      KOMODO_DATABASE_PASSWORD: ${KOMODO_DB_PASSWORD}
      KOMODO_PASSKEY: ${KOMODO_PASSKEY}
      KOMODO_JWT_SECRET: ${KOMODO_JWT_SECRET}
      KOMODO_WEBHOOK_SECRET: ${KOMODO_WEBHOOK_SECRET}
      KOMODO_HOST: ${KOMODO_HOST}
      KOMODO_TITLE: ${KOMODO_TITLE}
      KOMODO_FIRST_SERVER: ${KOMODO_FIRST_SERVER}
      KOMODO_FIRST_SERVER_NAME: ${KOMODO_FIRST_SERVER_NAME}
      KOMODO_LOCAL_AUTH: ${KOMODO_LOCAL_AUTH}
      KOMODO_DISABLE_USER_REGISTRATION: ${KOMODO_DISABLE_USER_REGISTRATION}
      KOMODO_INIT_ADMIN_USERNAME: ${KOMODO_INIT_ADMIN_USERNAME}
      KOMODO_INIT_ADMIN_PASSWORD: ${KOMODO_INIT_ADMIN_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${COMPOSE_KOMODO_BACKUPS_PATH}:/backups
      - ${COMPOSE_KOMODO_REPO_PATH}:/syncs/podhaus
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9120/ > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  periphery:
    container_name: komodo-periphery
    image: ghcr.io/moghtech/komodo-periphery:${COMPOSE_KOMODO_IMAGE_TAG:-latest}
    labels:
      komodo.skip:
    restart: unless-stopped
    # SELinux enforcing on Fedora Asahi denies cross-label writes to
    # /var/run/docker.sock; label:disable exempts the periphery container
    # from SELinux confinement so it can talk to the Docker daemon.
    security_opt:
      - label:disable
    environment:
      KOMODO_PASSKEYS: ${KOMODO_PASSKEY}
      TZ: ${TZ}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc
      - ${PERIPHERY_ROOT_DIRECTORY:-/etc/komodo}:${PERIPHERY_ROOT_DIRECTORY:-/etc/komodo}
      - ${COMPOSE_KOMODO_REPO_PATH}:/etc/komodo/repo

networks:
  dockernet:
    external: true

volumes:
  # NOTE: These are intentionally local volumes, NOT NFS-backed.
  # The /Jump export on kangaroo uses all_squash (writes land as 1000:100
  # regardless of container UID, chown is denied), which breaks the
  # postgres entrypoint's `chown -R postgres:postgres $PGDATA` step.
  # See alligator-bilby-migration.md "Deferred (non-blocking follow-ups)"
  # for the NAS fix plan; once /Jump stops squashing we flip both
  # volumes back to NFS at :/Jump/komodo/postgres and :/Jump/komodo/ferretdb.
  # Until then, komodo orchestration state lives on local bilby disk as a
  # pragmatic exception to the bilby-is-stateless rule. Losing it means
  # re-bootstrapping Komodo from git — annoying but not catastrophic since
  # all stack definitions are in the repo.
  postgres-data:
  ferretdb-state:
