###################################
# KOMODO COMPOSE - FERRETDB       #
###################################

## This compose file deploys:
##   1. Postgres + FerretDB Mongo adapter (https://www.ferretdb.com)
##   2. Komodo Core
##   3. Komodo Periphery
##
## All state lives on NFS under /Jump/komodo/ so bilby remains stateless.
## These services are the orchestration layer — they're intentionally not
## labelled for autoheal (restart: unless-stopped handles crashes; autoheal
## loops here would risk interrupting in-flight deployments).

services:
  postgres:
    container_name: komodo-postgres
    image: ghcr.io/ferretdb/postgres-documentdb
    labels:
      komodo.skip:
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${KOMODO_DB_USERNAME}
      POSTGRES_PASSWORD: ${KOMODO_DB_PASSWORD}
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KOMODO_DB_USERNAME}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  ferretdb:
    container_name: komodo-ferretdb
    image: ghcr.io/ferretdb/ferretdb
    labels:
      komodo.skip:
    restart: unless-stopped
    depends_on:
      - postgres
    volumes:
      - ferretdb-state:/state
    environment:
      FERRETDB_POSTGRESQL_URL: postgres://${KOMODO_DB_USERNAME}:${KOMODO_DB_PASSWORD}@postgres:5432/postgres
    healthcheck:
      test: ["CMD-SHELL", "test -S /state/ferretdb.sock || nc -z localhost 27017"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  core:
    container_name: komodo-core
    image: ghcr.io/moghtech/komodo-core:${COMPOSE_KOMODO_IMAGE_TAG:-latest}
    labels:
      komodo.skip:
    restart: unless-stopped
    depends_on:
      - ferretdb
    ports:
      - 9120:9120
    networks:
      - default
      - dockernet
    environment:
      KOMODO_DATABASE_ADDRESS: ferretdb:27017
      KOMODO_DATABASE_USERNAME: ${KOMODO_DB_USERNAME}
      KOMODO_DATABASE_PASSWORD: ${KOMODO_DB_PASSWORD}
      KOMODO_PASSKEY: ${KOMODO_PASSKEY}
      KOMODO_JWT_SECRET: ${KOMODO_JWT_SECRET}
      KOMODO_WEBHOOK_SECRET: ${KOMODO_WEBHOOK_SECRET}
      KOMODO_HOST: ${KOMODO_HOST}
      KOMODO_TITLE: ${KOMODO_TITLE}
      KOMODO_FIRST_SERVER: ${KOMODO_FIRST_SERVER}
      KOMODO_FIRST_SERVER_NAME: ${KOMODO_FIRST_SERVER_NAME}
      KOMODO_LOCAL_AUTH: ${KOMODO_LOCAL_AUTH}
      KOMODO_DISABLE_USER_REGISTRATION: ${KOMODO_DISABLE_USER_REGISTRATION}
      KOMODO_INIT_ADMIN_USERNAME: ${KOMODO_INIT_ADMIN_USERNAME}
      KOMODO_INIT_ADMIN_PASSWORD: ${KOMODO_INIT_ADMIN_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${COMPOSE_KOMODO_BACKUPS_PATH}:/backups
      - ${COMPOSE_KOMODO_REPO_PATH}:/syncs/podhaus
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9120/ > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  periphery:
    container_name: komodo-periphery
    image: ghcr.io/moghtech/komodo-periphery:${COMPOSE_KOMODO_IMAGE_TAG:-latest}
    labels:
      komodo.skip:
    restart: unless-stopped
    environment:
      KOMODO_PASSKEYS: ${KOMODO_PASSKEY}
      TZ: ${TZ}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc
      - ${PERIPHERY_ROOT_DIRECTORY:-/etc/komodo}:${PERIPHERY_ROOT_DIRECTORY:-/etc/komodo}
      - ${COMPOSE_KOMODO_REPO_PATH}:/etc/komodo/repo

networks:
  dockernet:
    external: true

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=10.0.0.25,nfsvers=4.1,soft,timeo=600,retrans=5,rw"
      device: ":/Jump/komodo/postgres"
  ferretdb-state:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=10.0.0.25,nfsvers=4.1,soft,timeo=600,retrans=5,rw"
      device: ":/Jump/komodo/ferretdb"
