[[stack]]
name = "onepassword"
description = "1Password Connect + komodo-op secret sync"
tags = ["podhaus"]
deploy = true

[stack.config]
server = "podhaus"
files_on_host = true
run_directory = "/etc/komodo/stacks/onepassword"

environment = """
OP_CREDENTIALS=[[ONEPASSWORD_CREDENTIALS]]
OP_SERVICE_ACCOUNT_TOKEN=[[ONEPASSWORD_CONNECT_TOKEN]]
KOMODO_API_KEY=[[ONEPASSWORD_API_KEY]]
KOMODO_API_SECRET=[[ONEPASSWORD_API_SECRET]]
"""

[[stack]]
name = "cloudflare-tunnel"
description = "Cloudflare Tunnel (locally managed) for external access"
tags = ["podhaus"]
deploy = true

[stack.config]
server = "podhaus"
files_on_host = true
run_directory = "/etc/komodo/stacks/cloudflare-tunnel"

environment = """
TUNNEL_CREDENTIALS=[[OP__KOMODO__CLOUDFLARE_TUNNEL_CREDENTIALS__CREDENTIAL]]
"""

[[stack]]
name = "flood"
description = "rtorrent + Flood web UI for torrents"
tags = ["podhaus"]
deploy = true

[stack.config]
server = "podhaus"
files_on_host = true
run_directory = "/etc/komodo/stacks/flood"

environment = """
FLOOD_SECRET=[[OP__KOMODO__FLOOD_SECRET__PASSWORD]]
"""

[[stack]]
name = "home-assistant"
description = "Home Assistant home automation"
tags = ["podhaus"]
deploy = true

[stack.config]
server = "podhaus"
files_on_host = true
run_directory = "/etc/komodo/stacks/home-assistant"

environment = """
TZ=[[TZ]]
"""

[[stack]]
name = "paperless"
description = "Paperless-ngx document management system"
tags = ["podhaus"]
deploy = true

[stack.config]
server = "podhaus"
files_on_host = true
run_directory = "/etc/komodo/stacks/paperless"

environment = """
PAPERLESS_SECRET_KEY=[[OP__KOMODO__PAPERLESS_SECRET_KEY__PASSWORD]]
PAPERLESS_POSTGRES_PASSWORD=[[OP__KOMODO__PAPERLESS_POSTGRES_PASSWORD__PASSWORD]]
PAPERLESS_ADMIN_PASSWORD=[[OP__KOMODO__PAPERLESS_ADMIN_PASSWORD__PASSWORD]]
TZ=[[TZ]]
"""
