[[stack]]
name = "onepassword"
description = "1Password Connect + komodo-op secret sync"
tags = ["podhaus"]
deploy = true

[stack.config]
server = "podhaus"
file_contents = '''
configs:
  op-credentials:
    environment: OP_CREDENTIALS

services:
  op-connect-api:
    container_name: op-connect-api
    image: 1password/connect-api:latest
    restart: unless-stopped
    configs:
      - source: op-credentials
        target: /home/opuser/.op/1password-credentials.json
    volumes:
      - op-connect-data:/home/opuser/.op/data

  op-connect-sync:
    container_name: op-connect-sync
    image: 1password/connect-sync:latest
    restart: unless-stopped
    configs:
      - source: op-credentials
        target: /home/opuser/.op/1password-credentials.json
    volumes:
      - op-connect-data:/home/opuser/.op/data

  komodo-op:
    container_name: komodo-op
    image: ghcr.io/0dragosh/komodo-op:latest
    restart: unless-stopped
    depends_on:
      - op-connect-api
    networks:
      - default
      - dockernet
    environment:
      OP_CONNECT_HOST: http://op-connect-api:8080
      OP_VAULT: hjpenq2avoprqh2u3hqxap3jjq
      OP_SERVICE_ACCOUNT_TOKEN: ${OP_SERVICE_ACCOUNT_TOKEN}
      KOMODO_HOST: http://komodo-core:9120
      KOMODO_API_KEY: ${KOMODO_API_KEY}
      KOMODO_API_SECRET: ${KOMODO_API_SECRET}
      SYNC_INTERVAL: 1m

networks:
  dockernet:
    external: true

volumes:
  op-connect-data:
'''

environment = """
OP_CREDENTIALS=[[ONEPASSWORD_CREDENTIALS]]
OP_SERVICE_ACCOUNT_TOKEN=[[ONEPASSWORD_CONNECT_TOKEN]]
KOMODO_API_KEY=[[ONEPASSWORD_API_KEY]]
KOMODO_API_SECRET=[[ONEPASSWORD_API_SECRET]]
"""

[[stack]]
name = "cloudflare-tunnel"
description = "Cloudflare Tunnel (locally managed) for external access"
tags = ["podhaus"]
deploy = true

[stack.config]
server = "podhaus"
file_contents = '''
configs:
  tunnel-credentials:
    environment: TUNNEL_CREDENTIALS
  tunnel-config:
    content: |
      tunnel: cc68c7c9-1dad-42aa-af04-46119d3e515f
      credentials-file: /etc/cloudflared/credentials.json
      ingress:
        - hostname: komodo.pod.haus
          service: http://komodo-core:9120
        - hostname: torrent.pod.haus
          service: http://flood:3000
        - hostname: home.pod.haus
          service: http://172.18.0.1:8123
        - hostname: kangaroo.pod.haus
          service: https://nginx:443
          originRequest:
            noTLSVerify: true
        - hostname: sync.pod.haus
          service: https://nginx:443
          originRequest:
            noTLSVerify: true
        - hostname: unifi.pod.haus
          service: https://nginx:443
          originRequest:
            noTLSVerify: true
        - service: http_status:404

services:
  cloudflare-tunnel:
    container_name: cloudflare-tunnel
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    configs:
      - source: tunnel-credentials
        target: /etc/cloudflared/credentials.json
      - source: tunnel-config
        target: /etc/cloudflared/config.yml
    networks:
      - dockernet

networks:
  dockernet:
    external: true
'''

environment = """
TUNNEL_CREDENTIALS=[[OP__KOMODO__CLOUDFLARE_TUNNEL_CREDENTIALS__CREDENTIAL]]
"""
