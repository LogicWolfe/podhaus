services:
  flood:
    container_name: flood
    image: jesec/rtorrent-flood
    restart: unless-stopped
    command: --auth=none --rtsocket=/tmp/rtorrent.sock
    user: "1000:1001"
    environment:
      HOME: /flood-db
      FLOOD_SECRET: ${FLOOD_SECRET}
      GID: "44"
    volumes:
      # rtorrent session (~16 MB: .torrent + .libtorrent_resume + .rtorrent
      # files). Local NVMe per the post-phase-6 sizing rule.
      - /var/lib/flood-db:/flood-db:z
      - ${MEDIA_DIR}:/data
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/ > /dev/null && ls /flood-db > /dev/null && ls /data > /dev/null"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s
    networks:
      - dockernet

networks:
  dockernet:
    external: true
