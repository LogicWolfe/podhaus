services:
  gatus:
    container_name: gatus
    image: ghcr.io/twin/gatus:latest
    restart: unless-stopped
    # SELinux enforcing on Fedora Asahi denies cross-label reads into
    # the bind-mounted config file; label:disable lifts confinement.
    security_opt:
      - label:disable
    environment:
      TZ: ${TZ}
      POSTMARK_SERVER_TOKEN: ${POSTMARK_SERVER_TOKEN}
      GATUS_BACKREST_PUSH_TOKEN: ${GATUS_BACKREST_PUSH_TOKEN}
    volumes:
      - ${PODHAUS_REPO}/gatus/config.yaml:/config/config.yaml:ro
      - gatus-data:/data
    networks:
      - dockernet
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD", "/gatus", "healthcheck"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  dockernet:
    external: true

volumes:
  gatus-data:
