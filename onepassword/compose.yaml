configs:
  op-credentials:
    environment: OP_CREDENTIALS

services:
  op-connect-api:
    container_name: op-connect-api
    image: 1password/connect-api:latest
    restart: unless-stopped
    configs:
      - source: op-credentials
        target: /home/opuser/.op/1password-credentials.json
    volumes:
      - op-connect-data:/home/opuser/.op/data
    networks:
      - dockernet

  op-connect-sync:
    container_name: op-connect-sync
    image: 1password/connect-sync:latest
    restart: unless-stopped
    configs:
      - source: op-credentials
        target: /home/opuser/.op/1password-credentials.json
    volumes:
      - op-connect-data:/home/opuser/.op/data
    networks:
      - dockernet

  komodo-op:
    container_name: komodo-op
    # Upstream ghcr.io/0dragosh/komodo-op ships a mislabelled arm64 tag —
    # its Dockerfile hardcodes GOARCH=amd64 so the "arm64" manifest is
    # actually an amd64 image and crashes with exec format error on aarch64.
    # We build locally via onepassword/komodo-op.Dockerfile; rebuild with:
    #   docker build -f onepassword/komodo-op.Dockerfile -t komodo-op:local-arm64 onepassword/
    # pull_policy: never tells compose to trust the local tag and skip
    # the registry pull that would fail (local tag doesn't exist on any
    # registry).
    image: komodo-op:local-arm64
    pull_policy: never
    restart: unless-stopped
    depends_on:
      - op-connect-api
    networks:
      - dockernet
    environment:
      OP_CONNECT_HOST: http://op-connect-api:8080
      OP_VAULT: hjpenq2avoprqh2u3hqxap3jjq
      OP_SERVICE_ACCOUNT_TOKEN: ${OP_SERVICE_ACCOUNT_TOKEN}
      KOMODO_HOST: http://komodo-core:9120
      KOMODO_API_KEY: ${KOMODO_API_KEY}
      KOMODO_API_SECRET: ${KOMODO_API_SECRET}
      SYNC_INTERVAL: 1m
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x komodo-op > /dev/null || pgrep komodo-op > /dev/null"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  dockernet:
    external: true

volumes:
  # NOTE: op-connect-data is intentionally local, NOT NFS-backed. Same
  # NAS squash issue as komodo-postgres — Docker's volume setup tries to
  # chown the mount point for the container's user (opuser), and /Jump's
  # all_squash export silently denies it. Flip back to NFS at
  # :/Jump/onepassword once kangaroo's /Jump export stops squashing.
  op-connect-data:
