[[stack]]
name = "cloudflare-tunnel"
description = "Cloudflare Tunnel (locally managed) for external access"
tags = ["podhaus"]
# Bilby is now the live tunnel origin. Alligator's cloudflare-tunnel was
# stopped 2026-04-14 during the flood + tunnel cutover; running two
# cloudflared instances on the same tunnel id creates active-active
# load balancing and breaks routing for hostnames whose backends only
# exist on one host. If alligator is revived, `docker stop cloudflare-tunnel`
# there before it rejoins the LAN.
deploy = true

[stack.config]
server = "podhaus"
files_on_host = true
run_directory = "/etc/komodo/repo/cloudflare-tunnel"

environment = """
TUNNEL_CREDENTIALS=[[OP__KOMODO__CLOUDFLARE_TUNNEL_CREDENTIALS__CREDENTIAL]]
"""
