[[stack]]
name = "cloudflare-tunnel"
description = "Cloudflare Tunnel (locally managed) for external access"
tags = ["podhaus"]
# deploy = false until the phase 8 cutover in alligator-bilby-migration.md.
# Alligator is still running the same tunnel id (cc68c7c9-...); having two
# cloudflared instances on the same tunnel creates active-active load
# balancing and breaks routing for hostnames whose backends only exist on
# one host. Flip back to true when we're ready to stop alligator's tunnel.
deploy = false

[stack.config]
server = "podhaus"
files_on_host = true
run_directory = "/etc/komodo/repo/cloudflare-tunnel"

environment = """
TUNNEL_CREDENTIALS=[[OP__KOMODO__CLOUDFLARE_TUNNEL_CREDENTIALS__CREDENTIAL]]
"""
