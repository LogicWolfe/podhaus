configs:
  tunnel-credentials:
    environment: TUNNEL_CREDENTIALS
  tunnel-config:
    content: |
      tunnel: cc68c7c9-1dad-42aa-af04-46119d3e515f
      credentials-file: /etc/cloudflared/credentials.json
      ingress:
        - hostname: komodo.pod.haus
          service: http://komodo-core:9120
        - hostname: torrent.pod.haus
          service: http://flood:3000
        - hostname: home.pod.haus
          service: http://172.18.0.1:8123
        - hostname: kangaroo.pod.haus
          service: http://10.0.0.25:8080
        - hostname: sync.pod.haus
          service: http://172.18.0.1:8384
        - hostname: unifi.pod.haus
          service: https://10.0.0.1:443
          originRequest:
            noTLSVerify: true
        - hostname: paperless.pod.haus
          service: http://paperless:8000
        - hostname: logs.pod.haus
          service: http://grafana:3000
        - hostname: vlogs.pod.haus
          service: http://victoria-logs:9428
        - hostname: uptime.pod.haus
          service: http://uptime-kuma:3001
        - service: http_status:404

services:
  cloudflare-tunnel:
    container_name: cloudflare-tunnel
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --metrics 0.0.0.0:20241 --config /etc/cloudflared/config.yml run
    configs:
      - source: tunnel-credentials
        target: /etc/cloudflared/credentials.json
      - source: tunnel-config
        target: /etc/cloudflared/config.yml
    # No healthcheck / autoheal: the cloudflared image is distroless (no
    # shell, wget, or curl) so in-container probes can't reach /ready on
    # port 20241. cloudflared handles its own reconnection, and a true
    # crash is caught by `restart: unless-stopped`. External liveness is
    # monitored from Uptime Kuma hitting the public hostnames.
    networks:
      - dockernet

networks:
  dockernet:
    external: true
