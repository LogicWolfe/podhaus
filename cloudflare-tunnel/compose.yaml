configs:
  # tunnel-credentials stays as a compose `config` because it's an
  # env-sourced secret blob (TUNNEL_CREDENTIALS comes from 1P via
  # Komodo). The ingress rules used to be inline `content: |` here too,
  # which made them invisible to git diff and required a force-recreate
  # to pick up changes — they now live in cloudflare-tunnel/config.yml
  # and are bind-mounted in below.
  tunnel-credentials:
    environment: TUNNEL_CREDENTIALS

services:
  cloudflare-tunnel:
    container_name: cloudflare-tunnel
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --metrics 0.0.0.0:20241 --config /etc/cloudflared/config.yml run
    # SELinux enforcing on Fedora Asahi denies cross-label reads into the
    # bind-mounted ingress config; label:disable lifts the confinement.
    # Same pattern as the alloy + grafana config bind mounts in logging/.
    security_opt:
      - label:disable
    configs:
      - source: tunnel-credentials
        target: /etc/cloudflared/credentials.json
    volumes:
      - ${PODHAUS_REPO}/cloudflare-tunnel/config.yml:/etc/cloudflared/config.yml:ro
    # No healthcheck / autoheal: the cloudflared image is distroless (no
    # shell, wget, or curl) so in-container probes can't reach /ready on
    # port 20241. cloudflared handles its own reconnection, and a true
    # crash is caught by `restart: unless-stopped`. External liveness is
    # monitored from Uptime Kuma hitting the public hostnames.
    networks:
      - dockernet

networks:
  dockernet:
    external: true
